<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Bravo Virtual Airline</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080A12;
    --surface: #0F1220;
    --surface2: #141728;
    --border: #1E2340;
    --gold: #C8961C;
    --gold-light: #E0B050;
    --gold-dim: #7A5A10;
    --text: #F0EDE6;
    --text-sec: #8A8FA8;
    --text-dim: #4A506A;
    --radius: 4px;
    --danger: #e05050;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Background grid */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(200,150,28,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,150,28,0.035) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(200,150,28,0.06) 0%, transparent 70%);
  }

  /* Card */
  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    padding: 24px;
    animation: fadeUp 0.6s ease forwards;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .login-header { text-align: center; margin-bottom: 36px; }
  .login-logo { height: 56px; margin-bottom: 20px; filter: drop-shadow(0 0 24px rgba(200,150,28,0.2)); }
  .login-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-sec); margin-bottom: 6px;
  }
  .login-header p { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    position: relative; overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700;
    margin-bottom: 4px;
  }
  .card-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text); padding: 13px 16px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(200,150,28,0.08); }
  .input-wrap input::placeholder { color: var(--text-dim); }
  .input-wrap input.error { border-color: var(--danger); }

  .pass-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px;
    transition: color 0.2s; line-height: 1;
    padding: 4px;
  }
  .pass-toggle:hover { color: var(--text-sec); }

  .form-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; margin-top: -8px;
  }
  .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .remember input[type="checkbox"] { accent-color: var(--gold); width: 14px; height: 14px; }
  .remember span { font-size: 12px; color: var(--text-sec); }
  .forgot { font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
  .forgot:hover { color: var(--gold); }

  .btn-login {
    width: 100%; background: var(--gold); color: #000;
    border: none; cursor: pointer; padding: 14px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-login:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(200,150,28,0.3); }
  .btn-login:active { transform: translateY(0); }
  .btn-login.loading { pointer-events: none; opacity: 0.7; }

  .btn-login .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none; margin-top: 16px;
    background: rgba(224,80,80,0.1); border: 1px solid rgba(224,80,80,0.3);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; color: #e08080; text-align: center;
  }
  .error-msg.show { display: block; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; }

  .demo-hint {
    background: rgba(200,150,28,0.06); border: 1px solid rgba(200,150,28,0.15);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
    text-align: center;
  }
  .demo-hint strong { color: var(--gold); }

  .back-link {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--text-dim);
  }
  .back-link a { color: var(--text-sec); text-decoration: none; transition: color 0.2s; }
  .back-link a:hover { color: var(--gold); }

  .vid-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 12px; color: var(--text-dim);
  }
  .vid-badge {
    background: rgba(200,150,28,0.12); border: 1px solid rgba(200,150,28,0.2);
    color: var(--gold); font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-wrap">
  <div class="login-header">
    <img src="assets/logo.png" alt="Bravo Virtual Airline" class="login-logo" />
    <h1>Área de Membros</h1>
    <p>ICAO: BRV &nbsp;·&nbsp; Hub: SBGR &nbsp;·&nbsp; IVAO Partner</p>
  </div>

  <div class="login-card">
    <div class="card-title">Entrar</div>
    <div class="card-sub">Acesse sua conta de piloto BRV</div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="piloto@email.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pass-toggle" onclick="togglePass()" id="passToggle" title="Mostrar senha">👁</button>
        </div>
      </div>
      <div class="form-meta">
        <label class="remember">
          <input type="checkbox" id="remember" />
          <span>Lembrar acesso</span>
        </label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Entrar na conta</span>
        <div class="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg">E-mail ou senha inválidos. Tente novamente.</div>
    </form>

    <div class="divider"><span>acesso de demonstração</span></div>

    <div class="demo-hint">
      Use <strong>piloto@bravo.aero</strong> e senha <strong>brv2024</strong><br />para acessar a conta de demonstração.
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Voltar ao site principal</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC2dDGhKjzHSclyFwUFNGA60DtXAjLEJ6I",
    authDomain: "bravo-aviation.firebaseapp.com",
    projectId: "bravo-aviation",
    storageBucket: "bravo-aviation.firebasestorage.app",
    messagingSenderId: "712016002234",
    appId: "1:712016002234:web:ce7a8e39c28bc6d8ca5683"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('passToggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    err.classList.remove('show');
    btn.classList.add('loading');

    const persistence = remember
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;

    auth.setPersistence(persistence)
      .then(() => auth.signInWithEmailAndPassword(email, password))
      .then(() => { window.location.href = 'dashboard.html'; })
      .catch(() => {
        btn.classList.remove('loading');
        err.classList.add('show');
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
        setTimeout(() => {
          document.getElementById('email').classList.remove('error');
          document.getElementById('password').classList.remove('error');
        }, 2000);
      });
  }

  auth.onAuthStateChanged(u => { if (u) window.location.href = 'dashboard.html'; });
</script>
</body>
</html>
