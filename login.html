<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Bravo Virtual Airline</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
  --bg: #080612;
  --surface: #0E0B1E;
  --surface2: #130F27;
  --border: #1E1840;
  --gold: #00EEFF;
  --gold-light: #60F5FF;
  --gold-dim: #007A99;
    --pink: #FF2080;
    --pink-light: #FF60A8;
  --text: #F0EAF8;
  --text-sec: #9A8FB8;
  --text-dim: #4A4068;
  --radius: 4px;
  --blue: #00EEFF;
  --purple: #9B30FF;
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Background grid */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,238,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,238,255,0.035) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
  }
  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 40% 40%, rgba(0,238,255,0.10) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 75% 60%, rgba(0,238,255,0.07) 0%, transparent 60%);
  }

  /* Card */
  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 440px;
    padding: 24px;
    animation: fadeUp 0.6s ease forwards;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .login-header { text-align: center; margin-bottom: 36px; }
  .login-logo { height: 100px; margin-bottom: 16px; filter: drop-shadow(0 0 32px rgba(0,238,255,0.4)) drop-shadow(0 0 20px rgba(255,32,128,0.3)); mix-blend-mode: screen; }
  .login-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-sec); margin-bottom: 6px;
  }
  .login-header p { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    position: relative; overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--info, #00EEFF), transparent);
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700;
    margin-bottom: 4px;
  }
  .card-sub { font-size: 13px; color: var(--text-sec); margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text); padding: 13px 16px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(0,238,255,0.08); }
  .input-wrap input::placeholder { color: var(--text-dim); }
  .input-wrap input.error { border-color: var(--danger); }

  .pass-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px;
    transition: color 0.2s; line-height: 1;
    padding: 4px;
  }
  .pass-toggle:hover { color: var(--text-sec); }

  .form-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; margin-top: -8px;
  }
  .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .remember input[type="checkbox"] { accent-color: var(--gold); width: 14px; height: 14px; }
  .remember span { font-size: 12px; color: var(--text-sec); }
  .forgot { font-size: 12px; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
  .forgot:hover { color: var(--gold); }

  .btn-login {
    width: 100%; background: #00EEFF; color: #000;
    border: none; cursor: pointer; padding: 14px;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-login:hover { background: #60F5FF; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,238,255,0.4); }
  .btn-login:active { transform: translateY(0); }
  .btn-login.loading { pointer-events: none; opacity: 0.7; }

  .btn-login .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none; margin-top: 16px;
    background: rgba(224,80,80,0.1); border: 1px solid rgba(224,80,80,0.3);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; color: #e08080; text-align: center;
  }
  .error-msg.show { display: block; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; white-space: nowrap; }

  .demo-hint {
    background: rgba(0,238,255,0.06); border: 1px solid rgba(0,238,255,0.15);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 12px; color: var(--text-dim); line-height: 1.6;
    text-align: center;
  }
  .demo-hint strong { color: var(--gold); }

  .back-link {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--text-dim);
  }
  .back-link a { color: var(--text-sec); text-decoration: none; transition: color 0.2s; }
  .back-link a:hover { color: var(--gold); }

  .vid-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 12px; color: var(--text-dim);
  }
  .vid-badge {
    background: rgba(0,238,255,0.12); border: 1px solid rgba(0,238,255,0.2);
    color: var(--gold); font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-wrap">
  <div class="login-header">
    <img src="assets/logo.png?v=1777246397516" alt="Bravo Virtual Airline" class="login-logo" />
    <h1>Área de Membros</h1>
    <p>ICAO: BRV &nbsp;·&nbsp; Hub: SBGR &nbsp;·&nbsp; IVAO Partner</p>
  </div>

  <div class="login-card">
    <div class="card-title">Entrar</div>
    <div class="card-sub">Acesse sua conta de piloto BRV</div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="piloto@email.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pass-toggle" onclick="togglePass()" id="passToggle" title="Mostrar senha">👁</button>
        </div>
      </div>
      <div class="form-meta">
        <label class="remember">
          <input type="checkbox" id="remember" />
          <span>Lembrar acesso</span>
        </label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-text">Entrar na conta</span>
        <div class="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg">E-mail ou senha inválidos. Tente novamente.</div>
    </form>

    <div class="divider"><span>acesso de demonstração</span></div>

    <div class="demo-hint">
      Use <strong>piloto@bravo.aero</strong> e senha <strong>brv2024</strong><br />para acessar a conta de demonstração.
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Voltar ao site principal</a>
  </div>
</div>

<script>
  // Demo users
  const USERS = [
    {
      email: 'piloto@bravo.aero',
      password: 'brv2024',
      name: 'João Silva',
      vid: '487231',
      rank: 'Comandante',
      rankLevel: 4,
      hours: 623.5,
      flights: 87,
      joinDate: '2024-03-15',
      aircraft: 'Boeing 737-800',
      avatar: 'JS'
    },
    {
      email: 'admin@bravo.aero',
      password: 'admin2024',
      name: 'Carlos Bravo',
      vid: '123456',
      rank: 'Comandante Sênior',
      rankLevel: 5,
      hours: 1240,
      flights: 210,
      joinDate: '2024-01-01',
      aircraft: 'Airbus A320',
      avatar: 'CB'
    }
  ];

  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('passToggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    err.classList.remove('show');
    btn.classList.add('loading');

    setTimeout(() => {
      const user = USERS.find(u => u.email === email && u.password === password);
      btn.classList.remove('loading');

      if (user) {
        const storage = remember ? localStorage : sessionStorage;
        storage.setItem('brv_user', JSON.stringify(user));
        localStorage.setItem('brv_lang', localStorage.getItem('brv_lang') || 'pt');
        window.location.href = 'dashboard.html';
      } else {
        err.classList.add('show');
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
        setTimeout(() => {
          document.getElementById('email').classList.remove('error');
          document.getElementById('password').classList.remove('error');
        }, 2000);
      }
    }, 900);
  }

  // Check if already logged in
  const stored = localStorage.getItem('brv_user') || sessionStorage.getItem('brv_user');
  if (stored) window.location.href = 'dashboard.html';
</script>
</body>
</html>
