const logEl = document.getElementById('log');
const btnImport = document.getElementById('btn-import');
const btnCheck = document.getElementById('btn-check');
const loginBox = document.getElementById('login-box');
const summaryEl = document.getElementById('summary');

function log(msg, cls='') {
  const line = document.createElement('div');
  line.className = cls;
  line.innerHTML = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    loginBox.style.display = 'none';
    btnImport.disabled = false;
    btnCheck.disabled = false;
    btnImport.textContent = `▶ Importar ${ROUTES_737.length} rotas B737-800`;
    log(`✅ Autenticado como <b>${user.email}</b>`, 'ok');
    log(`Total de rotas para importar: <b>${ROUTES_737.length}</b>`, 'bold');
  } else {
    loginBox.style.display = 'block';
    btnImport.disabled = true;
    btnCheck.disabled = true;
    btnImport.textContent = '⏳ Aguardando login...';
    log('⚠ Não autenticado. Faça login acima.', 'err');
  }
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('email').value;
  const pass  = document.getElementById('password').value;
  const errEl = document.getElementById('login-err');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    errEl.textContent = '';
  } catch(e) {
    errEl.textContent = e.message;
  }
});

// ── Verificar Firestore ───────────────────────────────────────────────────────
btnCheck.addEventListener('click', async () => {
  btnCheck.disabled = true;
  log('--- Verificando Firestore... ---', 'bold');
  try {
    const snap = await db.collection('routes').get();
    const existing = snap.docs.map(d => d.data().flightNumber || d.data().fn);
    const byAircraft = {};
    snap.docs.forEach(d => {
      const ac = d.data().aircraft || d.data().ac || '?';
      byAircraft[ac] = (byAircraft[ac] || 0) + 1;
    });
    log(`Total de rotas no Firestore: <b>${snap.size}</b>`, 'ok');
    Object.entries(byAircraft).forEach(([ac, n]) => log(`  ${ac}: ${n} rotas`, 'skip'));
    const missing = ROUTES_737.filter(r => !existing.includes(r.flightNumber));
    log(`Rotas B737-800 já presentes: <b>${ROUTES_737.length - missing.length}</b>`, 'ok');
    log(`Rotas B737-800 faltando: <b>${missing.length}</b>`, missing.length > 0 ? 'err' : 'ok');
  } catch(e) {
    log('Erro: ' + e.message, 'err');
  }
  btnCheck.disabled = false;
});

// ── Importar ─────────────────────────────────────────────────────────────────
btnImport.addEventListener('click', async () => {
  btnImport.disabled = true;
  btnCheck.disabled = true;
  summaryEl.style.display = 'none';
  log('--- Iniciando importação... ---', 'bold');

  // Busca existentes pelo campo flightNumber
  let existingFns = new Set();
  try {
    const snap = await db.collection('routes').get();
    snap.docs.forEach(d => {
      const fn = d.data().flightNumber || d.data().fn;
      if (fn) existingFns.add(fn);
    });
    log(`Firestore: ${snap.size} rotas existentes lidas.`, 'skip');
  } catch(e) {
    log('Erro ao ler Firestore: ' + e.message, 'err');
    btnImport.disabled = false;
    btnCheck.disabled = false;
    return;
  }

  let added = 0, skipped = 0, errors = 0;

  for (const route of ROUTES_737) {
    if (existingFns.has(route.flightNumber)) {
      log(`  ↷ SKIP  ${route.flightNumber}  (${route.dep}→${route.arr})`, 'skip');
      skipped++;
      continue;
    }
    try {
      await db.collection('routes').add(route);
      log(`  ✔ ADD   ${route.flightNumber}  ${route.dep}→${route.arr}  ${route.city1}→${route.city2}`, 'ok');
      added++;
    } catch(e) {
      log(`  ✘ ERR   ${route.flightNumber}  ${e.message}`, 'err');
      errors++;
    }
  }

  log('--- Concluído! ---', 'bold');
  summaryEl.style.display = 'block';
  summaryEl.innerHTML = `
    <b>Resultado:</b><br>
    ✅ Inseridas: <b style="color:#00EEFF">${added}</b><br>
    ↷ Ignoradas (já existiam): <b style="color:#9A8FB8">${skipped}</b><br>
    ❌ Erros: <b style="color:#FF2080">${errors}</b><br><br>
    ${added > 0 ? '✅ Abra o <b>flight.html</b> e recarregue — o filtro B737-800 deve aparecer.' : ''}
  `;

  btnImport.textContent = `✅ Importação concluída (${added} inseridas)`;
  btnCheck.disabled = false;
});
