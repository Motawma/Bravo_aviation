<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Setup — Bravo Aviation</title>
<style>
  body { background:#080612; color:#F0EAF8; font-family:monospace; padding:40px; max-width:700px; }
  h2 { color:#00EEFF; margin-bottom:8px; }
  p  { color:#9A8FB8; margin-bottom:24px; }
  .log { margin:5px 0; font-size:13px; line-height:1.6; }
  .ok   { color:#3db07a; }
  .err  { color:#e05555; }
  .info { color:#00EEFF; }
  .warn { color:#f0a500; }
  .dim  { color:#4A4068; }
  .btns { display:flex; gap:12px; flex-wrap:wrap; margin-top:24px; }
  button {
    background:#00EEFF; color:#000; border:none;
    padding:12px 28px; font-size:13px; font-weight:700;
    cursor:pointer; border-radius:4px; letter-spacing:0.05em;
  }
  button.sec { background:#1E1840; color:#9A8FB8; }
  button:disabled { opacity:0.4; cursor:not-allowed; }
  #log { margin-top:28px; border-top:1px solid #1E1840; padding-top:20px; }
</style>
</head>
<body>
<h2>Bravo Aviation — Setup Admin</h2>
<p>Use os botões abaixo para diagnosticar e corrigir o acesso admin.</p>

<div class="btns">
  <button id="btn-diag" onclick="runDiag()">🔍 Diagnosticar</button>
  <button id="btn-fix"  onclick="runFix()" class="sec">⚙ Forçar role admin</button>
  <button id="btn-create" onclick="runCreate()" class="sec">➕ Criar conta admin</button>
</div>
<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC2dDGhKjzHSclyFwUFNGA60DtXAjLEJ6I",
  authDomain: "bravo-aviation.firebaseapp.com",
  projectId: "bravo-aviation",
  storageBucket: "bravo-aviation.firebasestorage.app",
  messagingSenderId: "712016002234",
  appId: "1:712016002234:web:ce7a8e39c28bc6d8ca5683"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const ADMIN_EMAIL    = 'admin@bravo.aero';
const ADMIN_PASSWORD = 'admin2024';

function log(msg, type='info') {
  document.getElementById('log').innerHTML +=
    `<div class="log ${type}">${msg}</div>`;
}
function sep() { log('─────────────────────────────────', 'dim'); }

/* ── DIAGNÓSTICO ── */
async function runDiag() {
  document.getElementById('log').innerHTML = '';
  log('Iniciando diagnóstico...', 'info');
  sep();

  // Passo 1: verificar sessão atual
  const current = auth.currentUser;
  if (current) {
    log(`✓ Sessão ativa: ${current.email}`, 'ok');
    log(`  UID atual: <strong>${current.uid}</strong>`, 'info');
  } else {
    log('⚠ Nenhuma sessão ativa. Fazendo login...', 'warn');
    try {
      await auth.signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASSWORD);
      log(`✓ Login OK: ${auth.currentUser.email}`, 'ok');
      log(`  UID: <strong>${auth.currentUser.uid}</strong>`, 'info');
    } catch(e) {
      log(`✗ Erro no login: ${e.message}`, 'err');
      if (e.code === 'auth/user-not-found') {
        log('→ Conta não existe. Use "Criar conta admin".', 'warn');
      }
      return;
    }
  }

  const uid = auth.currentUser.uid;
  sep();

  // Passo 2: verificar documento Firestore
  log(`Verificando users/${uid} no Firestore...`, 'info');
  try {
    const snap = await db.collection('users').doc(uid).get();
    if (!snap.exists) {
      log('✗ Documento NÃO existe no Firestore!', 'err');
      log('→ Use "Forçar role admin" para criar.', 'warn');
    } else {
      const data = snap.data();
      log(`✓ Documento encontrado`, 'ok');
      log(`  name: ${data.name || '(vazio)'}`, 'info');
      log(`  role: <strong style="color:${data.role==='admin'?'#3db07a':'#e05555'}">${data.role || '(sem role!)'}</strong>`, 'info');
      log(`  email: ${data.email || '(vazio)'}`, 'info');
      if (data.role === 'admin') {
        log('✓ Role admin OK! Tente fazer logout e login novamente.', 'ok');
      } else {
        log('✗ Role NÃO é admin. Use "Forçar role admin".', 'err');
      }
    }
  } catch(e) {
    log(`✗ Erro ao ler Firestore: ${e.message}`, 'err');
  }
}

/* ── FORÇAR ROLE ADMIN ── */
async function runFix() {
  document.getElementById('log').innerHTML = '';
  log('Forçando role admin...', 'info');
  sep();

  // Login se necessário
  if (!auth.currentUser) {
    try {
      await auth.signInWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASSWORD);
    } catch(e) {
      log(`✗ Erro no login: ${e.message}`, 'err');
      return;
    }
  }

  const uid = auth.currentUser.uid;
  log(`UID: ${uid}`, 'info');

  const adminDoc = {
    name:     'Willian Mota',
    email:    ADMIN_EMAIL,
    vid:      '000000',
    role:     'admin',
    hours:    0,
    flights:  0,
    aircraft: 'Boeing 737-800',
    joinDate: '2024-01-01',
    status:   'active',
    permissions: {
      pirep:true, flights:true, routes:true,
      ranking:true, downloads:true, notifications:true
    }
  };

  try {
    await db.collection('users').doc(uid).set(adminDoc);
    log('✓ Documento salvo com role: admin', 'ok');
    sep();
    log('✓ Pronto! Agora:', 'ok');
    log('1. Faça <a href="login.html" style="color:#00EEFF">logout e login</a> novamente', 'ok');
    log('2. Será redirecionado para o painel admin automaticamente', 'ok');
  } catch(e) {
    log(`✗ Erro ao salvar: ${e.message}`, 'err');
    log('Verifique as regras do Firestore no console do Firebase.', 'warn');
  }
}

/* ── CRIAR CONTA ── */
async function runCreate() {
  document.getElementById('log').innerHTML = '';
  log('Criando conta admin...', 'info');
  sep();

  try {
    const cred = await auth.createUserWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASSWORD);
    log(`✓ Conta criada! UID: ${cred.user.uid}`, 'ok');
    log('Agora clique em "Forçar role admin".', 'warn');
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') {
      log('Conta já existe. Clique em "Forçar role admin".', 'warn');
    } else {
      log(`✗ Erro: ${e.message}`, 'err');
    }
  }
}
</script>
</body>
</html>
