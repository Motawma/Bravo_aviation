<style>
:root {
  --bg: #080612; --surface: #0E0B1E; --surface2: #130F27;
  --border: #1E1840; --gold: #00EEFF; --gold-light: #60F5FF;
  --gold-dim: #007A99; --text: #F0EAF8; --text-sec: #9A8FB8;
  --text-dim: #4A4068; --radius: 4px;
  --success: #3db07a; --danger: #e05555; --sidebar: 220px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.topbar-logo img { height: 36px; mix-blend-mode: screen; }
.topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; }
.topbar-sep { width: 1px; height: 22px; background: var(--border); }
.topbar-flight { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--gold); letter-spacing: 0.05em; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.btn-back { background: none; border: 1px solid var(--border); color: var(--text-sec); padding: 6px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-back:hover { border-color: var(--gold-dim); color: var(--gold); }

/* CONTENT */
.content { flex: 1; padding: 28px; max-width: 1280px; width: 100%; margin: 0 auto; }

/* AIRPORT CARDS */
.ac-cards { display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto; }
.ac-card {
  flex: 1; min-width: 200px; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border); background: var(--surface); position: relative;
}
.ac-card-img { width: 100%; height: 110px; object-fit: cover; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
.ac-card-img img { width: 100%; height: 110px; object-fit: cover; }
.ac-card-badge {
  position: absolute; top: 82px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 2px solid var(--border); border-radius: 50%;
  width: 56px; height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-sec);
  text-align: center;
}
.ac-card-body { padding: 36px 14px 14px; text-align: center; }
.ac-card-icao { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 2px; }
.ac-card-name { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-card-btns { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
.ac-btn { background: none; border: 1px solid var(--border); color: var(--text-sec); padding: 3px 9px; border-radius: 3px; font-size: 10px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.15s; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; display: inline-block; }
.ac-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* MAIN GRID */
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* SUMMARY CARD */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 16px; text-align: center; letter-spacing: 0.05em; }
.summary-table { width: 100%; border-collapse: collapse; }
.summary-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid rgba(30,24,64,0.5); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .k { color: var(--text-dim); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.summary-table .v { color: var(--text); font-weight: 600; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; text-align: right; }

/* INTEGRATION BUTTONS */
.int-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.int-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px; border-radius: var(--radius); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; text-decoration: none; transition: all 0.2s; border: 1px solid;
}
.int-btn.simbrief { background: rgba(58,127,212,0.12); border-color: rgba(58,127,212,0.35); color: #5BA8FF; }
.int-btn.simbrief:hover { background: rgba(58,127,212,0.22); }
.int-btn.skyvector { background: rgba(61,176,122,0.1); border-color: rgba(61,176,122,0.3); color: #3db07a; }
.int-btn.skyvector:hover { background: rgba(61,176,122,0.2); }
.int-btn.vatsim { background: rgba(0,238,255,0.08); border-color: rgba(0,238,255,0.25); color: var(--gold); }
.int-btn.vatsim:hover { background: rgba(0,238,255,0.15); }
.int-btn.ivao { background: rgba(155,48,255,0.1); border-color: rgba(155,48,255,0.3); color: #B070FF; }
.int-btn.ivao:hover { background: rgba(155,48,255,0.2); }

/* METAR */
.metar-section { margin-bottom: 20px; }
.metar-dep, .metar-arr { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.metar-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
.metar-icao-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.metar-rows { display: flex; flex-wrap: wrap; gap: 10px; }
.metar-item { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 5px; }
.metar-item strong { color: var(--text); }
.metar-raw-text { font-family: monospace; font-size: 10px; color: var(--text-dim); margin-top: 8px; word-break: break-all; background: var(--bg); border-radius: 2px; padding: 6px; }

/* MAP */
.map-wrap { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
#brief-map { height: 420px; }
.leaflet-container { background: #080612; }
.leaflet-control-zoom a { background: #0E0B1E !important; border-color: #1E1840 !important; color: #9A8FB8 !important; }
.leaflet-control-zoom a:hover { background: #130F27 !important; color: #00EEFF !important; }
.leaflet-control-attribution { background: rgba(8,6,18,0.8) !important; color: #4A4068 !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: #4A4068 !important; }

/* AIRPORT MARKER */
.apt-marker { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #00EEFF; background: #00EEFF; box-shadow: 0 0 8px #00EEFF; }
.apt-marker.arr { border-color: #3db07a; background: #3db07a; box-shadow: 0 0 8px #3db07a; }

/* LOADING */
.loading { text-align: center; padding: 60px; color: var(--text-dim); }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } #brief-map { height: 280px; } }
</style>
</head>

function getApt(icao){ return AIRPORTS[icao] || { name: icao, lat: -15, lon: -52 }; }

/* ── AUTH ── */
document.body.style.visibility = 'hidden';
auth.onAuthStateChanged(async (fbUser) => {
  if (!fbUser) {
    await new Promise(r => setTimeout(r, 800));
    if (auth.currentUser) return;
    window.location.href = 'login.html';
    return;
  }
  try {
    const snap = await db.collection('users').doc(fbUser.uid).get();
    if (!snap.exists) { window.location.href = 'login.html'; return; }
    const data = snap.data();

    document.body.style.visibility = '';
    const pf = data.pendingFlight;
    if (!pf) {
      document.getElementById('main-content').innerHTML = `
        <div class="loading" style="padding:80px">
          <div style="font-size:36px;margin-bottom:16px">✈️</div>
          <div style="font-size:16px;margin-bottom:10px">Nenhuma rota selecionada.</div>
          <a href="flight.html" style="color:var(--gold);font-size:13px;">← Escolher uma rota</a>
        </div>`;
      return;
    }
    renderBrief(pf, data);
  } catch(e) {
    document.body.style.visibility = '';
    console.error(e);
  }
});

/* ── MAP ── */
function initMap(dep, arr, depApt, arrApt) {
  const midLat = (depApt.lat + arrApt.lat) / 2;
  const midLon = (depApt.lon + arrApt.lon) / 2;
  const dist   = Math.sqrt(Math.pow(depApt.lat - arrApt.lat, 2) + Math.pow(depApt.lon - arrApt.lon, 2));
  const zoom   = dist > 20 ? 5 : dist > 10 ? 6 : 7;

  const map = L.map('brief-map', { center: [midLat, midLon], zoom, zoomControl: true, attributionControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 14
  }).addTo(map);

  // Route line
  L.polyline([[depApt.lat, depApt.lon],[arrApt.lat, arrApt.lon]], {
    color: '#00EEFF', weight: 2, dashArray: '6 4', opacity: 0.7
  }).addTo(map);

  // Departure marker
  L.marker([depApt.lat, depApt.lon], {
    icon: L.divIcon({ html: '<div class="apt-marker"></div>', iconSize:[12,12], iconAnchor:[6,6], className:'' })
  }).addTo(map).bindPopup(`<b style="color:#00EEFF">${dep}</b><br>${depApt.name}`);

  // Arrival marker
  L.marker([arrApt.lat, arrApt.lon], {
    icon: L.divIcon({ html: '<div class="apt-marker arr"></div>', iconSize:[12,12], iconAnchor:[6,6], className:'' })
  }).addTo(map).bindPopup(`<b style="color:#3db07a">${arr}</b><br>${arrApt.name}`);

  // Labels
  L.marker([depApt.lat, depApt.lon], {
    icon: L.divIcon({ html: `<div style="color:#00EEFF;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;text-shadow:0 1px 3px #000">${dep}</div>`, iconSize:[40,16], iconAnchor:[-8,2], className:'' })
  }).addTo(map);
  L.marker([arrApt.lat, arrApt.lon], {
    icon: L.divIcon({ html: `<div style="color:#3db07a;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;text-shadow:0 1px 3px #000">${arr}</div>`, iconSize:[40,16], iconAnchor:[-8,2], className:'' })
  }).addTo(map);
}

/* ── METAR ── */
async function fetchMetarBrief(icao, elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  try {
    const res = await fetch(`https://metar.vatsim.net/metar.php?id=${icao}`);
    const raw = (await res.text()).trim();
    if (!raw || raw.includes('No METAR')) {
      el.querySelector('div:last-child').textContent = 'METAR não disponível no momento.';
      return;
    }
    const wind  = parseWind(raw);
    const vis   = parseVis(raw);
    const cloud = parseCloud(raw);
    const temp  = parseTemp(raw);
    const qnh   = parseQNH(raw);
    const time  = parseTime(raw);
    el.innerHTML = el.innerHTML.split('<div style')[0] + `
      <div class="metar-rows">
        <div class="metar-item">💨 <strong>${wind}</strong></div>
        <div class="metar-item">👁 <strong>${vis}</strong></div>
        <div class="metar-item">☁️ <strong>${cloud}</strong></div>
        <div class="metar-item">🌡 <strong>${temp}</strong></div>
        <div class="metar-item">📊 <strong>${qnh}</strong></div>
        ${time ? `<div class="metar-item" style="color:var(--text-dim);font-size:10px">ATT ${time}Z</div>` : ''}
      </div>
      <div class="metar-raw-text">${raw}</div>`;
  } catch(_) {
    el.querySelector('div:last-child').textContent = 'Erro ao carregar METAR.';
  }
}

/* METAR parsers */
function parseWind(r){
  const m = r.match(/(\d{3}|VRB)(\d{2,3})(G(\d{2,3}))?KT/);
  if (!m) return 'CALM';
  return `${m[1]}° ${m[2]}${m[4]?'G'+m[4]:''}kt`;
}
function parseVis(r){
  if (/CAVOK/.test(r)) return 'CAVOK';
  const m = r.match(/(?:^|\s)(\d{4})(?:\s|$)/);
  return m ? (parseInt(m[1])>=9999?'+10km':m[1]+'m') : '—';
}
function parseCloud(r){
  const m=[...r.matchAll(/(FEW|SCT|BKN|OVC)(\d{3})/g)];
  if(!m.length) return /NSC|NCD|CLR/.test(r)?'Clear':'—';
  return m.map(x=>x[1]+' '+parseInt(x[2])*100+'ft').join(' · ');
}
function parseTemp(r){
  const m=r.match(/\s(M?\d{2})\/(M?\d{2})\s/);
  if(!m) return '—';
  const t=m[1].replace('M','-'), d=m[2].replace('M','-');
  return `${t}°C / DP ${d}°C`;
}
function parseQNH(r){
  const m=r.match(/Q(\d{4})/);
  return m?m[1]+' hPa':'—';
}
function parseTime(r){
  const m=r.match(/\d{6}Z/);
  return m?m[0].slice(2,6):'';
}

/* ── HELPERS ── */
function buildIvaoUrl(dep, arr, fl, fn, ac, route, eet) {
  const fp = {
    callsign:          fn  || '',
    flightRules:       'I',
    flightType:        'S',
    aircraftId:        toICAOType(ac),
    departureId:       dep || '',
    arrivalId:         arr || '',
    altitudeType:      'F',
    altitude:          fl && fl !== '—' ? parseInt(fl, 10) : 0,
    cruisingSpeedType: 'N',
    cruisingSpeed:     460,
    remarks:           'OPR/BRV IVAOVA/BRV'
  };
  if (route && route.trim()) fp.route = route.trim();
  if (eet && eet !== '—') {
    const m = eet.match(/(\d+)h(\d+)/);
    if (m) fp.eet = parseInt(m[1]) * 3600 + parseInt(m[2]) * 60;
  }
  return 'https://fpl.ivao.aero/flight-plans/create?flightPlan=' + encodeURIComponent(btoa(JSON.stringify(fp)));
}

function buildSimBriefUrl(dep, arr, fl, fn, ac, route) {
  const type = toICAOType(ac);
  const num  = (fn || '').replace(/^BRV/i, '').trim() || '001';
  let url = `https://www.simbrief.com/system/dispatch.php`
          + `?orig=${dep}&dest=${arr}&type=${type}`
          + `&airline=BRV&fltnum=${num}`
          + `&fl=${fl}00`;
  if (route && route.trim()) url += `&route=${encodeURIComponent(route.trim())}`;
  url += `&rmk=${encodeURIComponent('TCAS WWW.BRAVOAVIATION.SITE IVAOVA/BRV')}`;
  return url;
}

function toICAOType(ac) {
  const map = {
    'a320':'A320','airbus a320':'A320','a319':'A319','airbus a319':'A319',
    'a321':'A321','airbus a321':'A321',
    'b737-800':'B738','b737800':'B738','boeing 737-800':'B738',
    'b737-700':'B737','boeing 737-700':'B737',
    'b777':'B77W','boeing 777':'B77W',
    'b747':'B744','boeing 747':'B744',
  };
  return map[(ac||'').toLowerCase()] || 'A320';
}
